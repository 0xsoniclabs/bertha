name: Rust

permissions:
  contents: read
  checks: write

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: format
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: install rust
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: rustfmt
    - name: load cache
      uses: Swatinem/rust-cache@v2
    - name: cargo fmt
      run: cargo +nightly fmt --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: install rust
      uses: dtolnay/rust-toolchain@1.90
      with:
        components: clippy
    - name: install protoc
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: load cache
      uses: Swatinem/rust-cache@v2
    - name: cargo clippy
      run: cargo clippy --all-targets --no-deps -- --deny warnings

  doc:
    name: doc
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: install rust
      uses: dtolnay/rust-toolchain@1.90
    - name: install protoc
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: load cache
      uses: Swatinem/rust-cache@v2
    - name: cargo doc
      env:
        # Treat warnings as errors
        RUSTDOCFLAGS: "-D warnings"
      run: cargo doc --no-deps
    - name: cargo test doc
      run: cargo test --doc

  build:
    name: build
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: install rust
      uses: dtolnay/rust-toolchain@1.90
    - name: install protoc
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: install rocksdb
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: librocksdb-dev
    - name: load cache
      uses: Swatinem/rust-cache@v2
    - name: cargo build
      run: cargo build

  test:
    name: test
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: install rust
      uses: dtolnay/rust-toolchain@1.90
    - name: install protoc
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: install rocksdb
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: librocksdb-dev
    - name: load cache
      uses: Swatinem/rust-cache@v2
    - name: cargo test
      run: cargo test --all-features --all-targets

  coverage:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: install rust
      uses: dtolnay/rust-toolchain@1.90
    - name: install protoc
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: install rocksdb
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: librocksdb-dev
    - name: load cache
      uses: Swatinem/rust-cache@v2
    - name: install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov
    - name: generate code coverage
      run: cargo llvm-cov --all-features --workspace --codecov --output-path codecov.json
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: codecov.json
        fail_ci_if_error: true
        verbose: true

  unused-deps:
    name: unused deps
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: load cache
      uses: Swatinem/rust-cache@v2
    - name: install cargo-machete
      run: cargo install cargo-machete
    - name: cargo machete
      run: cargo machete

  denied-deps:
    name: denied deps
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: load cache
      uses: Swatinem/rust-cache@v2
    - name: cargo deny
      uses: EmbarkStudios/cargo-deny-action@v2
