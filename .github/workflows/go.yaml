name: Go

permissions:
  contents: read
  checks: write

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/go.yaml'
      - 'block-db-go-bindings/**'
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/go.yaml'
      - 'block-db-go-bindings/**'

jobs:
  format:
    name: format
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: go fmt
      working-directory: block-db-go-bindings
      run: gofmt -s -d .

  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: install deps
      run: sudo apt-get install librocksdb-dev protobuf-compiler
    - name: go vet
      working-directory: block-db-go-bindings
      run: go vet

  test:
    name: test
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: install deps
      run: sudo apt-get install librocksdb-dev protobuf-compiler
    - name: go test
      working-directory: block-db-go-bindings
      run: go test
