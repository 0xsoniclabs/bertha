name: Go

permissions:
  contents: read
  checks: write

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: setup go
      uses: actions/setup-go@v5 # Use actions/setup-go to specify the Go version
      with:
        go-version: "1.26.0"
        cache-dependency-path: go/go.sum
    - name: install rocksdb
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: librocksdb-dev
    - name: golangci-lint go tools
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.12.2
        working-directory: go
    - name: golangci-lint test_data_generator
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.12.2
        working-directory: utils/test_data_generator

  license-check:
    name: license check
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: setup go
      uses: actions/setup-go@v5 # Use actions/setup-go to specify the Go version
      with:
        go-version: "1.26.0"
        cache-dependency-path: utils/scripts/license/go.sum
    - name: check license headers
      run: go run ./utils/scripts/license/add_license_header.go -dir ./ -check

  test:
    name: test
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: setup go
      uses: actions/setup-go@v5 # Use actions/setup-go to specify the Go version
      with:
        go-version: "1.26.0"
        cache-dependency-path: go/go.sum
    - name: install rocksdb
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: librocksdb-dev
    - name: go test
      working-directory: go
      run: go test --count 1 ./...

  carmen-tracy-patch:
    name: carmen-tracy-patches
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4
      with:
        path: bertha
    - name: clone Carmen
      run: git clone --depth 1 https://github.com/0xsoniclabs/carmen
    - name: clone Tracy
      run: git clone --depth 1 https://github.com/0xsoniclabs/tracy
    - name: check if carmen and tracy patches apply
      working-directory: bertha/go
      run: git apply enable-carmen.patch && git apply enable-tracy.patch
    - name: check if go module is tidy
      working-directory: bertha/go
      run: go build -n ./...

