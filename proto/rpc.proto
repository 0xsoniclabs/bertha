syntax = "proto3";
package rpc;

service BlockRpc {
  rpc GetBlock (BlockRequest) returns (EncodedBlock);
  rpc GetBlockRange (BlockRangeRequest) returns (stream EncodedBlock);
  rpc List (ListRequest) returns (ChainRanges);
}

message BlockRequest {
  uint64 chainId = 1;
  uint64 number = 2;
}

message BlockRangeRequest {
  uint64 chainId = 1;
  uint64 from = 2;
  uint64 to = 3;
}

message EncodedBlock {
  bytes data = 1;
  uint64 number = 2;
}

message ListRequest {
  optional uint64 chainId = 1;
}

message ChainRanges {
  repeated ChainRange chainRanges = 1;
}

message ChainRange {
  uint64 chainId = 1;
  repeated BlockRange blockRanges = 2;
}

message BlockRange {
  uint64 from = 1;
  uint64 to = 2;
}
