syntax = "proto3";
package rpc;

// Defines the RPC services exposed by the block service.
service BlockRpc {
  // Retrieves a range of blocks for a specific chain ID and returns them as a stream of encoded blocks.
  rpc GetBlockRange (BlockRangeRequest) returns (stream EncodedBlock);
  // Retrieves the list of block ranges and metadata for all chains or a specific chain ID.
  rpc List (ListRequest) returns (ChainListings);
  // Retrieves the metadata for a specific chain ID.
  rpc GetMetadata (MetadataRequest) returns (Metadata);
}

// The requested range of blocks for a specific chain ID for the GetBlockRange RPC endpoint.
message BlockRangeRequest {
  uint64 chainId = 1;
  uint64 from = 2;
  uint64 to = 3;
}

// The encoded block data and block number returned by the GetBlockRange RPC endpoint.
message EncodedBlock {
  bytes data = 1;
  uint64 number = 2;
}

// The request for the List RPC endpoint, which lists all chain block ranges.
// It can optionally specify a chain ID to filter the results.
message ListRequest {
  optional uint64 chainId = 1;
}

// The list of block ranges and metadata for the requested chains, returned by the List RPC endpoint.
message ChainListings {
  repeated ChainListing chainListings = 1;
}

// The block ranges and metadata for a specific chain.
message ChainListing {
  uint64 chainId = 1;
  repeated BlockRange blockRanges = 2;
  bool hasRulesUpdateHeights = 3;
  bool hasCorrections = 4;
}

// A block range, consisting of the start and end block numbers (both inclusive).
message BlockRange {
  uint64 from = 1;
  uint64 to = 2;
}

// The request for the GetMetadata endpoint.
message MetadataRequest {
  uint64 chainId = 1;
}

// The metadata of a chain.
message Metadata {
  optional bytes rulesUpdateHeights = 1;
  optional bytes corrections = 2;
}
