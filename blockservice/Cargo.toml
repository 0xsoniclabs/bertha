[package]
name = "blockservice"
version = "0.1.0"
edition = "2024"
publish = false

[profile.release]
debug = true

[dependencies]
bertha-types = { path = "../bertha-types" }
genesis-parser = { path = "../genesis-parser" }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
prost = "0.13.5"
rocksdb = { version = "0.23.0", default-features = false, features = [
    "lz4",
    "bindgen-runtime",
] }
tempfile = "3.20.0"
thiserror = "2.0.12"
tonic = { version = "0.13.1", features = ["gzip", "zstd"] }
jsonrpsee = { version = "0.25.1", features = ["http-client"] }
tokio = { version = "1.45.1", features = ["rt-multi-thread"] }
clap = { version = "4.5.40", features = ["derive"] }
indicatif = "0.17.11"
tokio-stream = "0.1.17"

[dev-dependencies]
rand = "0.9.1"
mockall = "0.13.1"
wiremock = "0.6.3"
hyper-util = "0.1.14"
futures = "0.3.31"
tower = "0.5.2"

[build-dependencies]
tonic-build = "*"

[lints]
workspace = true

[package.metadata.cargo-machete]
# Machete does not understand that prost is used in generated code.
ignored = ["prost"]
