[package]
name = "blockservice"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
tempfile = "3.20.0"
bertha-types = { path = "../bertha-types" }
rocksdb = { version = "0.23.0", default-features = false, features = [
    "lz4",
    "bindgen-runtime",
] }
prost = "0.13.5"
thiserror = "2.0.12"
tonic = "0.13.1"
clap = { version = "4.5.40", features = ["derive"] }

[dev-dependencies]
rand = "0.9.1"

[build-dependencies]
tonic-build = "*"

[lints]
workspace = true

[package.metadata.cargo-machete]
# Machete does not understand that prost is used in generated code.
ignored = ["prost"]
