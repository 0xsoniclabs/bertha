[package]
name = "blockservice"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
bertha-types = { path = "../bertha-types" }
genesis-parser = { path = "../genesis-parser" }
prost = "0.13.5"
rocksdb = { version = "0.23.0", default-features = false, features = [
    "lz4",
    "bindgen-runtime",
] }
tempfile = "3.20.0"
thiserror = "2.0.12"
tonic = { version = "0.13.1", features = ["gzip"] }
tokio = "1.45.1"
clap = { version = "4.5.40", features = ["derive"] }
indicatif = "0.17.11"
tokio-stream = "0.1.17"

[dev-dependencies]
rand = "0.9.1"
mockall = "0.13.1"

[build-dependencies]
tonic-build = "*"

[lints]
workspace = true

[package.metadata.cargo-machete]
# Machete does not understand that prost is used in generated code.
ignored = ["prost"]
